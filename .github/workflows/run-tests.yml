name: R Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R-${{ matrix.config.r }})
    
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: '4.5.1'}
          - {os: ubuntu-latest, r: '4.5.1'}
          - {os: macos-latest, r: '4.5.1'}
    
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
      
      - name: Setup system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Setup system dependencies (MacOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config libpng cairo freetype harfbuzz fribidi
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          echo "PATH=$(brew --prefix libpng)/bin:$PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix libpng)/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig" >> $GITHUB_ENV
          # Export compile/link flags derived from pkg-config
          echo "PKG_CPPFLAGS=$(pkg-config --cflags libpng)" >> $GITHUB_ENV
          echo "PKG_LIBS=$(pkg-config --libs libpng)" >> $GITHUB_ENV

      - name: Sanity check (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "pkg-config: $(pkg-config --modversion libpng)"
          echo "PKG_CPPFLAGS=$PKG_CPPFLAGS"
          echo "PKG_LIBS=$PKG_LIBS"
      
      - name: Restore renv packages
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Run tests
        run: |
          Rscript -e "testthat::test_dir('tests/testthat')"
      
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.config.os }}-r${{ matrix.config.r }}
          path: tests/testthat/*.Rout*
